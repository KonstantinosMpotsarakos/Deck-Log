name: Update naval news digest

on:
  schedule:
    # Runs every 6 hours. Cron is UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds and generate AI digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_and_digest.py

      - name: Build static site
        run: python build_site.py

      - name: Commit and push if changed
        run: |
          git config user.name "naval-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/articles.db docs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update: fetch new articles and rebuild site"
            git push
          fi
